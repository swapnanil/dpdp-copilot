services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: dpdp
      POSTGRES_USER: dpdp
      POSTGRES_PASSWORD: dpdp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dpdp"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: npm run migrate
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - migrate

volumes:
  pgdata:
